services:
  api:
    image: ip_identity_provider:0.3
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    volumes:
      - uploads_data:/workspace/uploads
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_started
    networks:
      - auth_network

  db:
    image: postgres:18-alpine
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - auth_network

networks:
  auth_network:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
